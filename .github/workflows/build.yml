name: build-all-4-targets

# Produces 4 separate artifacts in a single CI run:
#   - macOS arm64           (Apple Silicon)
#   - macOS x86_64          (Intel)
#   - Windows x86_64        (AMD64)
#   - Windows arm64
#
# This is the ONLY way to truly one-click all four targets, because
# PyInstaller cannot cross-compile between operating systems.
#
# Triggers
# --------
#   · Push to main → builds + uploads as workflow artifacts (no release)
#   · Push a tag like v1.0.0 → builds + uploads + attaches to a GitHub
#     Release named after the tag
#   · Manual via "Run workflow" button in the GitHub UI

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macos-arm64
            runner: macos-14            # GitHub-hosted Apple Silicon
            os: macos
            arch: arm64
            shell: bash
          - label: macos-x86_64
            runner: macos-13            # last Intel runner
            os: macos
            arch: x86_64
            shell: bash
          - label: windows-x64
            runner: windows-latest      # AMD64
            os: windows
            arch: x86_64
            shell: pwsh
          - label: windows-arm64
            runner: windows-11-arm      # ARM64 runner
            os: windows
            arch: arm64
            shell: pwsh

    defaults:
      run:
        shell: ${{ matrix.shell }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python (${{ matrix.arch }})
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          architecture: ${{ matrix.arch == 'x86_64' && 'x64' || matrix.arch }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Build (macOS)
        if: matrix.os == 'macos'
        run: |
          python build.py --clean --cli --arch ${{ matrix.arch }} --out-suffix ${{ matrix.label }}

      - name: Build (Windows)
        if: matrix.os == 'windows'
        run: |
          python build.py --clean --cli --out-suffix ${{ matrix.label }}

      - name: Package macOS artifact
        if: matrix.os == 'macos'
        run: |
          cd dist
          # zip up the .app bundle and the CLI binary
          zip -r -y IPQualityChecker-${{ matrix.label }}.zip \
              IPQualityChecker-${{ matrix.label }}.app \
              ipqc-${{ matrix.label }}

      - name: Package Windows artifact
        if: matrix.os == 'windows'
        run: |
          cd dist
          Compress-Archive -Path "IPQualityChecker-${{ matrix.label }}.exe","ipqc-${{ matrix.label }}.exe" `
                           -DestinationPath "IPQualityChecker-${{ matrix.label }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: IPQualityChecker-${{ matrix.label }}
          path: dist/IPQualityChecker-${{ matrix.label }}.zip
          if-no-files-found: error

  release:
    name: Attach artifacts to release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
