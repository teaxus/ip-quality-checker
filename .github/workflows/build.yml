name: build-all-4-targets

# Produces 4 separate artifacts in a single CI run:
#   - macOS arm64           (Apple Silicon)
#   - macOS x86_64          (Intel)
#   - Windows x86_64        (AMD64)
#   - Windows arm64
#
# This is the ONLY way to truly one-click all four targets, because
# PyInstaller cannot cross-compile between operating systems.
#
# Triggers
# --------
#   · Push to main → builds + uploads as workflow artifacts (no release)
#   · Push a tag like v1.0.0 → builds + uploads + attaches to a GitHub
#     Release named after the tag
#   · Manual via "Run workflow" button in the GitHub UI

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build (all / windows / macos)'
        required: false
        default: 'all'
        type: choice
        options: [all, windows, macos]

jobs:
  build-macos:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.platform == 'all' || inputs.platform == 'macos' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macos-arm64
            runner: macos-14            # GitHub-hosted Apple Silicon
            arch: arm64
          - label: macos-x86_64
            runner: macos-13            # last Intel runner
            arch: x86_64

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python (${{ matrix.arch }})
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          architecture: ${{ matrix.arch == 'x86_64' && 'x64' || matrix.arch }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Build (macOS)
        run: |
          python build.py --clean --arch ${{ matrix.arch }} --out-suffix ${{ matrix.label }}

      - name: Package macOS artifact
        run: |
          cd dist
          zip -r -y IPQualityChecker-${{ matrix.label }}.zip \
              IPQualityChecker-${{ matrix.label }}.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: IPQualityChecker-${{ matrix.label }}
          path: dist/IPQualityChecker-${{ matrix.label }}.zip
          if-no-files-found: error

  build-windows:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.platform == 'all' || inputs.platform == 'windows' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: windows-x64
            runner: windows-latest      # AMD64
            arch: x86_64
          - label: windows-arm64
            runner: windows-11-arm      # ARM64 runner
            arch: arm64

    defaults:
      run:
        shell: pwsh

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python (${{ matrix.arch }})
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          architecture: ${{ matrix.arch == 'x86_64' && 'x64' || matrix.arch }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Build (Windows)
        run: |
          python build.py --clean --out-suffix ${{ matrix.label }}

      - name: Package Windows artifact
        run: |
          cd dist
          Compress-Archive -Path "IPQualityChecker-${{ matrix.label }}.exe" `
                           -DestinationPath "IPQualityChecker-${{ matrix.label }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: IPQualityChecker-${{ matrix.label }}
          path: dist/IPQualityChecker-${{ matrix.label }}.zip
          if-no-files-found: error

  release:
    name: Attach artifacts to release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
